        <div class="section" name="students">

                <p>Python基础教程</p>
                <a href="/book/python" title="Python书籍">查看详情</a>

        <div class="section" name="nested">

                <p>外层段落</p>

        <div class="footer" status="active">
            <p>页面底部信息</p>
